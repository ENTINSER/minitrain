version: "3.8"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: minitrain-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --default-artifact-root /mlflow/artifacts
      --backend-store-uri sqlite:///mlflow/mlflow.db
    volumes:
      - mlflow-data:/mlflow
    networks:
      - minitrain-net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: minitrain-api
    depends_on:
      - mlflow
    ports:
      - "8001:8001"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - TRAINING_DEMO_MODE=true
      - LOG_LEVEL=INFO
    networks:
      - minitrain-net

volumes:
  mlflow-data:

networks:
  minitrain-net:
    driver: bridge
